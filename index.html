<!DOCTYPE html>
<html lang="en" data-theme="ironman">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NOVA — Personal AI Operating System" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NOVA" />

  <title>NOVA</title>
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0e1a'/><text y='72' x='50' text-anchor='middle' font-size='64' font-family='system-ui,sans-serif' font-weight='700' fill='%2300d4ff'>N</text></svg>" />

  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/orb.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/transitions.css" />
</head>
<body>

  <div id="app">

    <!-- Ambient particle layer -->
    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <!-- Screen-level HUD overlay: corners, scan line, system bar, greeting -->
    <div id="hud-overlay" aria-hidden="true">
      <div class="hud-corner corner-tl"></div>
      <div class="hud-corner corner-tr"></div>
      <div class="hud-corner corner-bl"></div>
      <div class="hud-corner corner-br"></div>
      <div id="scan-line"></div>
      <div id="nova-greeting"></div>
      <div id="system-bar">
        <span id="sys-notes">0 NOTES</span>
        <span class="sys-sep">·</span>
        <span id="sys-tasks">0 PENDING</span>
        <span class="sys-sep">·</span>
        <span id="sys-uptime">UPTIME 0:00</span>
      </div>
    </div>

    <!-- Top bar -->
    <header id="top-bar" aria-label="Status bar">
      <div id="clock-display" aria-live="polite" aria-label="Current time">
        <span id="clock-time">00:00:00</span>
        <span id="clock-date">Loading...</span>
      </div>
      <div id="connectivity-dot" title="Connection status" aria-label="Connection status" role="status"></div>
    </header>

    <!-- Left nav dots -->
    <nav id="nav-dots" aria-label="Navigation">
      <button class="nav-dot active" data-view="home" title="Home" aria-label="Home view" aria-pressed="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
      <button class="nav-dot" data-view="notes" title="Notes" aria-label="Notes view" aria-pressed="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
      <button class="nav-dot" data-view="tasks" title="Tasks" aria-label="Tasks view" aria-pressed="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
      <button class="nav-dot" data-view="events" title="Activity" aria-label="Activity log view" aria-pressed="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </button>
    </nav>

    <!-- Main stage: orb -->
    <main id="main-stage" aria-label="NOVA interface">
      <!-- Orbital HUD canvas — drawn around the orb each frame -->
      <canvas id="orb-hud-canvas" aria-hidden="true"></canvas>
      <div id="orb-container" class="state-idle" aria-label="NOVA orb" role="img">
        <div id="orb-field"></div>
        <div id="orb-ring-3"></div>
        <div id="orb-glow-outer"></div>
        <div id="orb-ring-2"></div>
        <div id="orb-ring-1"></div>
        <div id="orb">
          <div id="orb-sphere-highlight"></div>
          <div id="orb-core"></div>
          <div id="orb-inner-ring"></div>
          <div id="orb-scan"></div>
          <div id="orb-shimmer"></div>
        </div>
      </div>

      <div id="orb-label" aria-live="polite">
        <span id="ai-name-display">NOVA</span>
        <span id="orb-status-text">Online · Ready</span>
      </div>
    </main>

    <!-- Side panel -->
    <aside id="panel" aria-label="Panel" aria-hidden="true">
      <div id="panel-header">
        <h2 id="panel-title">Notes</h2>
        <button id="panel-close" aria-label="Close panel">✕</button>
      </div>
      <div id="panel-content">
        <!-- Populated by modules -->
      </div>
    </aside>

    <!-- Panel backdrop -->
    <div id="panel-backdrop" aria-hidden="true"></div>

    <!-- Input bar -->
    <div id="input-bar" role="search" aria-label="NOVA input">
      <div id="input-wrapper">
        <input
          type="text"
          id="nova-input"
          placeholder="Talk to NOVA..."
          aria-label="Message NOVA"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button id="send-btn" aria-label="Send message" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" aria-live="polite" aria-label="Notifications"></div>

    <!-- PWA install banner -->
    <div id="install-banner" aria-label="Install NOVA" role="complementary" hidden>
      <div id="install-banner-content">
        <div id="install-banner-text">
          <strong>Install NOVA</strong>
          <span>Add to your desktop for faster access</span>
        </div>
        <div id="install-banner-actions">
          <button id="install-btn" class="btn btn-primary btn-sm">Install</button>
          <button id="install-dismiss" class="btn btn-ghost btn-sm" aria-label="Dismiss">✕</button>
        </div>
      </div>
    </div>

    <!-- Settings panel trigger -->
    <button id="settings-btn" aria-label="Settings" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal" aria-modal="true" role="dialog" aria-label="Settings" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Settings</h3>
          <button class="modal-close" aria-label="Close settings">✕</button>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <label class="settings-label">AI Name</label>
            <input type="text" id="setting-ai-name" class="settings-input" placeholder="NOVA" maxlength="20" />
          </div>
          <div class="settings-section">
            <label class="settings-label">Your Name</label>
            <input type="text" id="setting-user-name" class="settings-input" placeholder="Enter your name" maxlength="30" />
          </div>
          <div class="settings-section">
            <label class="settings-label">Theme</label>
            <div id="theme-picker" class="theme-picker" role="radiogroup" aria-label="Select theme">
              <button class="theme-option active" data-theme="ironman" role="radio" aria-checked="true">
                <span class="theme-swatch ironman-swatch"></span>
                <span>Iron Man</span>
              </button>
              <button class="theme-option" data-theme="space" role="radio" aria-checked="false">
                <span class="theme-swatch space-swatch"></span>
                <span>Space</span>
              </button>
              <button class="theme-option" data-theme="cyberpunk" role="radio" aria-checked="false">
                <span class="theme-swatch cyberpunk-swatch"></span>
                <span>Cyberpunk</span>
              </button>
              <button class="theme-option" data-theme="minimal" role="radio" aria-checked="false">
                <span class="theme-swatch minimal-swatch"></span>
                <span>Minimal</span>
              </button>
            </div>
          </div>
          <div class="settings-section">
            <label class="settings-label">Auto Theme by Time of Day</label>
            <label class="toggle-label">
              <input type="checkbox" id="setting-auto-theme" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span class="toggle-text">Switch theme automatically</span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button id="settings-save" class="btn btn-primary">Save Settings</button>
        </div>
      </div>
    </div>

  </div><!-- #app -->

  <script type="module" src="js/core/app.js"></script>
</body>
</html>
